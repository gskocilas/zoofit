      <form class="signup" id="signup" novalidate hidden>
        <div class="fields">
          <label class="field">
            <span class="label">Name <em>*</em></span>
            <input type="text" name="name" autocomplete="given-name" required />
          </label>
          <label class="field">
            <span class="label">Surname <em>*</em></span>
            <input type="text" name="surname" autocomplete="family-name" required />
          </label>
          <label class="field">
            <span class="label">Email <em>*</em></span>
            <input type="email" name="email" autocomplete="email" required />
          </label>
          <label class="field">
            <span class="label">Mobile</span>
            <input type="tel" name="mobile" autocomplete="tel" />
          </label>
          <label class="field field-wide">
            <span class="label">Message / Note</span>
            <textarea name="message" rows="3"></textarea>
          </label>
        </div>

        <div class="consent">
          <label class="consent-item">
            <input type="checkbox" name="privacy" required />
            <span>I agree to the <a href="#" target="_blank" rel="noopener noreferrer">Privacy Policy</a></span>
          </label>
          <label class="consent-item">
            <input type="checkbox" name="terms" required />
            <span>I agree to the <a href="#" target="_blank" rel="noopener noreferrer">Terms &amp; Conditions</a></span>
          </label>
        </div>

        <button type="submit" class="submit">SUBMIT</button>
        <p class="thanks" role="status" hidden>Thanks — you're on the list. We'll be in touch.</p>
      </form>
